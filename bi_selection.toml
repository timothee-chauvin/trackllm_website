# BI monitoring selection policy. The ONLY place cost is managed.
# Rules run top to bottom; each adds endpoints (no duplicates) until
# budget_per_month is reached. Per-endpoint monthly cost = measured
# cost_per_request x config.bi.samples_per_month (20 BIs x 10 samples x 30 days).

budget_per_month = 10.0
# Non-flagship endpoints whose monthly cost exceeds this are never probed past
# vetting (cached too_expensive). Flagships (pins + flagship rule models) are exempt.
max_endpoint_cost = 0.50

# Never selected anywhere (globs match "model" or "model#provider"). openrouter/*
# excludes stealth/rotating aliases (e.g. owl-alpha) that surface in popularity but
# aren't stable endpoints. We keep -preview variants.
exclude = ["*image*", "*-fast", "*search*", "*customtools*", "openrouter/*"]

[[rule]]
name = "flagships"           # newest 2 versions per family, cheapest provider each
kind = "models"
latest_n = 2
patterns = [
    "anthropic/claude-opus-*", "anthropic/claude-sonnet-*", "anthropic/claude-haiku-*",
    "anthropic/claude-fable-*",
    "openai/gpt-4o", "openai/gpt-4o-mini",
    "google/gemini-*-flash*",
    "deepseek/deepseek-v*", "deepseek/deepseek-chat*",
    "qwen/qwen3*", "z-ai/glm-*", "moonshotai/kimi-*",
    "x-ai/grok-*", "minimax/minimax-m*",
    "meta-llama/llama-4*", "mistralai/mistral-large*",
]
providers_per_model = 1
flagship = true              # exempt from max_endpoint_cost

[[rule]]
name = "popular"             # top-N models by OpenRouter token usage, where cheap
kind = "popular"
patterns = []
providers_per_model = 1
max_monthly_cost = 0.25

[[rule]]
name = "corroboration"       # extra providers for swap-prone families, where cheap
kind = "models"
patterns = ["deepseek/deepseek-v*", "z-ai/glm-*", "moonshotai/kimi-*"]
providers_per_model = "all"
max_monthly_cost = 0.10

[[rule]]
name = "provider-coverage"   # every provider represented by its cheapest endpoint
kind = "providers"
patterns = ["*"]
endpoints_per_provider = 1
max_monthly_cost = 0.25

[[rule]]
name = "long-tail"           # fill remaining budget, cheapest models first
kind = "models"
patterns = ["*"]
providers_per_model = 1
max_monthly_cost = 0.10

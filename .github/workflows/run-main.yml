name: Run Main Script

on:
  schedule:
    # Run every hour at minute 17
    - cron: '17 * * * *'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write  # Allow pushing commits

jobs:
  run-main:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync

    - name: Run main.py
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: uv run python src/trackllm_website/main.py

    - name: Compute LT scores
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: uv run python -m trackllm_website.lt_scores_cli latest

    - name: Commit and push results
      # Commit collected data even if a later step (e.g. LT scoring) failed, so a
      # downstream bug can never again silently stop the hourly data commits. The
      # job still reports failure if an earlier step failed (→ failure email).
      if: ${{ !cancelled() }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        git diff --staged --quiet || git commit -m "[bot] add new responses"
        git push

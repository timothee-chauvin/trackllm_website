name: Update Endpoints

on:
  schedule:
    # Run every 24 hours at 00:53 UTC
    - cron: '53 0 * * *'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write  # Allow pushing commits

jobs:
  update-endpoints:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync

    - name: Run update_endpoints.py
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: uv run python src/trackllm_website/update_endpoints.py

    - name: Commit and push changes
      # Commit whatever endpoint/state updates landed even if a prior step failed
      # (e.g. OpenRouter credits exhausted mid-onboarding), so partial BI onboarding
      # is persisted and the next run resumes instead of redoing it. A deliberate
      # cancel stays a clean abort (cancelled() => this step is skipped).
      if: ${{ !cancelled() }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        git diff --staged --quiet || git commit -m "[bot] Daily update of target endpoints"
        bash .github/scripts/push-with-rebase.sh

prompts = ["x", "Hi"]
data_dir = "website/data"
log_level = "INFO"

[api]
max_retries = 8
max_cost_mtok = 30
temperature = 1.0
max_workers = 80
top_logprobs_openrouter_default = 20
timeout = 15
abandon_after = 100
openrouter_avoid_free_endpoints = true

[api.top_logprobs_openrouter]
fireworks = 5
azure = 5
inference-net = 5
xai = 8

[bi]
data_dir = "website/data/b3it"
selection_path = "bi_selection.toml"
samples_per_day = 200  # BIs (top_k_bis=20) x samples/BI/day (queries_per_token=10), the monitoring cadence
days_per_month = 30

[bi.probe]
strategies_path = "strategies_test_reasoning.json"
prompt = "a"
max_budget = 2048
max_retries = 4

[bi.phase_1]
queries_per_token = 3
requests_per_second_per_endpoint = 5
max_concurrent_requests_per_endpoint = 10
max_concurrent_tokens_per_endpoint = 100
tokens_per_endpoint = 5000
request_delay_seconds = 5.0
border_input_candidate_ratio = 2
target_border_inputs = 50
queries_per_candidate = 100
max_retries = 3
abandon_after_timeouts = 20

[bi.prevalence]
queries_per_token = 3
tokens_per_endpoint = 1000

[bi.temperature_gate]
prevalence_trigger = 0.30   # if > this fraction of sampled prompts are border inputs, run the check
check_prompts = 8           # how many border prompts to re-sample at T=1
check_samples = 8           # samples per prompt at each temperature

[bi.phase_2]
queries_per_token = 10
requests_per_second_per_endpoint = 5
max_concurrent_requests_per_endpoint = 10
request_delay_seconds = 5.0
abandon_this_run_after = 100

[bi.detection]
window = 14
exclusion = 4
min_baseline = 5
sigma_k = 4.0
abs_delta = 0.2
persistence = 3
cooldown = 10
instability_window = 14
instability_threshold = 0.4

[bi.reinit]
reprobe_samples = 10
reference_samples = 100
top_k_bis = 20
min_bis = 10
stall_days = 7
recheck_days = 14
onboard_concurrency = 40
deselection_grace_days = 30
onboard_timeout_seconds = 10800

[bi.monitor]
max_concurrent_endpoints = 20

[bi.popularity]
top_n = 5

[plotting]
template = "plotly_white"
font_family = "Spectral"
